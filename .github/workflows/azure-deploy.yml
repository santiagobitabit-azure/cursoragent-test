name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: mundial-2026

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show --name "${{ vars.AZURE_ACR_NAME }}" --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" --query loginServer -o tsv)
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Import Node base images to ACR
        run: |
          ACR="${{ vars.AZURE_ACR_NAME }}"
          for img in node:20-bookworm node:20-bookworm-slim; do
            if ! az acr repository show --name "$ACR" --image "$img" >/dev/null 2>&1; then
              echo "Importando docker.io/library/${img}..."
              az acr import \
                --name "$ACR" \
                --source "docker.io/library/${img}" \
                --image "${img}"
            else
              echo "${img} ya existe en ACR, omitiendo import."
            fi
          done

      - name: Build and push image
        run: |
          LOGIN_SERVER="${{ steps.acr.outputs.login_server }}"
          az acr build \
            --registry "${{ vars.AZURE_ACR_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --build-arg "NODE_IMAGE=${LOGIN_SERVER}/node:20-bookworm" \
            --build-arg "NODE_SLIM_IMAGE=${LOGIN_SERVER}/node:20-bookworm-slim" \
            .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "App desplegada en: https://$FQDN"
